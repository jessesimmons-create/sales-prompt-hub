<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Prompt Hub</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdn.quilljs.com/1.3.7/quill.snow.css" />
</head>
<body>

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="app-label">Sales Prompt Hub</div>
      <div id="opp-selector">
        <button id="opp-trigger" type="button">
          <span id="opp-name-display">—</span>
          <svg class="opp-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div id="opp-dropdown" class="hidden"></div>
      </div>
    </div>
    <div id="stage-list"></div>
    <div id="sidebar-footer">
      <button id="role-toggle">
        <span id="role-icon"></span>
        <span id="role-label"></span>
      </button>
      <button id="manage-users-btn">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <circle cx="4.5" cy="3.5" r="2" stroke="currentColor" stroke-width="1.4"/>
          <path d="M1 10c0-2 1.6-3 3.5-3s3.5 1 3.5 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M9 5v4M7 7h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        Manage Users
      </button>
      <button id="reset-all-btn">Reset All Progress</button>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="stage-header">
      <div id="stage-header-top">
        <span id="stage-header-icon"></span>
        <span id="stage-header-title"></span>
        <div id="stage-header-meta">
          <span id="stage-stats"></span>
          <button id="reset-stage-btn">Reset Stage</button>
        </div>
      </div>
      <div id="condition-tabs"></div>
    </div>
    <div id="prompts-area">
      <div id="condition-banner"></div>
      <div id="prompts-grid"></div>
      <div id="steps-view" class="hidden">
        <div id="steps-progress-section">
          <div id="steps-progress-header">
            <span id="steps-count-label"></span>
            <span id="steps-pct-label"></span>
          </div>
          <div id="steps-progress-track">
            <div id="steps-progress-fill"></div>
          </div>
        </div>
        <div id="steps-grid"></div>
      </div>
    </div>
  </div>

  <!-- Add Modal (prompts, steps, and new opportunity) -->
  <div id="modal-overlay" class="hidden" role="dialog" aria-modal="true">
    <div id="modal">
      <div id="modal-header">
        <h2 id="modal-title">Add Prompt</h2>
        <button id="modal-close" aria-label="Close">&times;</button>
      </div>
      <div id="modal-body">
        <label for="modal-input-title">
          <span id="modal-title-label">Title</span>
          <span class="required">*</span>
        </label>
        <input id="modal-input-title" type="text" placeholder="e.g. ICP Fit Analysis" autocomplete="off" />
        <div id="modal-body-section">
          <label for="modal-input-body">
            <span id="modal-body-label">Prompt Text</span>
            <span class="optional">(optional — add now or later)</span>
          </label>
          <textarea id="modal-input-body" rows="7" placeholder="Paste your LLM prompt here…"></textarea>
        </div>
      </div>
      <div id="modal-footer">
        <button id="modal-cancel" class="btn-secondary">Cancel</button>
        <button id="modal-save" class="btn-primary">Add Prompt</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div id="delete-overlay" class="hidden" role="dialog" aria-modal="true">
    <div id="delete-modal">
      <div id="delete-icon">🗑️</div>
      <h3 id="delete-title">Remove?</h3>
      <p id="delete-desc"></p>
      <div id="delete-footer">
        <button id="delete-cancel" class="btn-secondary">Cancel</button>
        <button id="delete-confirm" class="btn-danger">Remove</button>
      </div>
    </div>
  </div>

  <!-- Comments Modal -->
  <div id="comments-overlay" class="hidden" role="dialog" aria-modal="true">
    <div id="comments-modal">
      <div id="comments-modal-header">
        <div>
          <div id="comments-modal-step-name"></div>
          <div id="comments-modal-subtitle">Comments</div>
        </div>
        <button id="comments-modal-close" aria-label="Close">&times;</button>
      </div>
      <div id="comments-list"></div>
      <div id="comments-editor-section">
        <div id="comments-editor"></div>
        <div id="comments-editor-footer">
          <button id="comments-add-btn">Add Comment</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Users Modal -->
  <div id="users-overlay" class="hidden" role="dialog" aria-modal="true">
    <div id="users-modal">
      <div id="users-modal-header">
        <h2 id="users-modal-title">Manage Users</h2>
        <button id="users-modal-close" aria-label="Close">&times;</button>
      </div>
      <div id="users-list"></div>
      <div id="users-add-row">
        <input id="users-add-email" type="email" placeholder="user@company.com" autocomplete="off" />
        <button id="users-add-role-btn" data-role="standard">Standard</button>
        <button id="users-add-btn">Add User</button>
      </div>
      <p id="users-add-error" class="hidden">Please enter a valid email address.</p>
    </div>
  </div>

  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
